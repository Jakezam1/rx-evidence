# Render Blueprint — deploy API + web + Postgres from one repo.
# Dashboard: New → Blueprint → Connect this repo → apply `render.yaml`.
#
# On first deploy, Render will prompt for GEMINI_API_KEY (sync: false).
# If you rename the API service, update NEXT_PUBLIC_API_BASE_URL to match its URL.

databases:
  - name: rx-evidence-db
    region: oregon
    plan: free

services:
  - type: web
    name: rx-evidence-api
    runtime: python
    region: oregon
    plan: free
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: rx-evidence-db
          property: connectionString
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: DEMO_PAPER_ID
        value: e793e16f-5016-47ba-83fb-5d123c896a9c

  - type: web
    name: rx-evidence-web
    runtime: node
    region: oregon
    plan: free
    rootDir: rx-evidence-next
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://rx-evidence-api.onrender.com
